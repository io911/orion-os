name: Build Orion OS & Installer ISO

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: orion-bootc
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Reconfigure Docker Storage Location
        run: |
          sudo systemctl stop docker.service docker.socket
          sudo mkdir -p /home/runner/docker
          echo '{"data-root": "/home/runner/docker"}' | sudo tee /etc/docker/daemon.json
          sudo rm -rf /var/lib/docker
          sudo systemctl start docker.service

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # We build directly using lowercase registry variables to avoid GHCR tag naming errors
      - name: Build Local Bootc Image
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -t ${IMAGE_LOWER}:latest \
            -f ./Containerfile .

      - name: Push Container to GitHub Packages
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker push ${IMAGE_LOWER}:latest

  generate-iso:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Work Directories
        run: |
          mkdir -p ./output
          mkdir -p ./config

      # The ISO utility pulls the image from the cloud, embedding the tracking URL natively into the OS
      - name: Generate Installer ISO
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run \
            --rm \
            --privileged \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --config /config.toml \
            --rootfs xfs \
            ${IMAGE_LOWER}:latest

      - name: Upload ISO Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-os-installer-iso
          path: ./output/bootiso/install.iso
          if-no-files-found: error
          retention-days: 7
