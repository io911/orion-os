name: Build Orion OS Installer ISO

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: orion-bootc

jobs:
  compile-iso:
    runs-on: ubuntu-latest
    steps:
      # 1. Clean the disk layout first
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # 2. Pull down your repository code files safely
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. Create required workspace output directories
      - name: Create Work Directories
        run: |
          mkdir -p ./output
          mkdir -p ./config

      # 4. Build using Docker (Natively uses the expanded storage drive)
      - name: Build Local Bootc Image
        run: |
          docker build \
            -t localhost/${{ env.IMAGE_NAME }}:latest \
            -f ./Containerfile .

      # 5. Extract image contents directly using the local Docker engine
      - name: Generate Installer ISO
        run: |
          docker run \
            --rm \
            --privileged \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            -v /var/run/docker.sock:/var/run/docker.sock \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --config /config.toml \
            localhost/${{ env.IMAGE_NAME }}:latest

      # 6. Securely upload the final bootable installer artifact
      - name: Upload ISO Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-os-installer-iso
          path: ./output/bootiso/install.iso
          if-no-files-found: error
          retention-days: 7
