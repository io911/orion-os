name: Build Orion OS & Installer ISO

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: orion-bootc
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Aggressively purge pre-baked system bloat to free up 40GB+ of space cleanly
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Local Bootc Image
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -t ${IMAGE_LOWER}:latest \
            -f ./Containerfile .

      - name: Push Container to GitHub Packages
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker push ${IMAGE_LOWER}:latest

  generate-iso:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Work Directories
        run: |
          mkdir -p ./output
          mkdir -p ./config

      - name: Generate Installer ISO
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run \
            --rm \
            --privileged \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --config /config.toml \
            --rootfs ext4 \
            --target-arch amd64 \
            ${IMAGE_LOWER}:latest

      - name: Upload ISO Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-os-installer-iso
          path: ./output/bootiso/orion-os.iso
          if-no-files-found: error
          retention-days: 7
