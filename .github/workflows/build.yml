name: Build Orion OS & Installer ISO

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: orion-bootc
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # Crucial step: Make sure we check out our code *after* clean up
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # Force compression on-disk to stop network timeouts
      - name: Build Bootc Image with Podman
        run: |
          podman build \
            --pull \
            --format docker \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -f ./Containerfile .

      # Force Podman to push sequentially to prevent GitHub's API from dropping it
      - name: Push Bootc Image to Registry
        run: |
          podman push \
            --jobs 1 \
            --compression-format gzip \
            --compression-level 4 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  generate-iso:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Work Directories
        run: |
          mkdir -p ./output
          mkdir -p ./config

      - name: Generate Installer ISO
        run: |
          # Use docker here since the builder image is optimized for it
          docker run \
            --rm \
            --privileged \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --config /config.toml \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Upload ISO Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-os-installer-iso
          path: ./output/bootiso/install.iso
          if-no-files-found: error
          retention-days: 7
