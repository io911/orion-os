name: Build Orion OS Installer ISO

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: orion-bootc

jobs:
  compile-iso:
    runs-on: ubuntu-latest
    steps:
      # 1. Maximize disk space on the virtual runner machine
      - name: Maximize Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. Checkout your repository files cleanly into the empty workspace
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. Create required workspace directories
      - name: Create Work Directories
        run: |
          mkdir -p ./output
          mkdir -p ./config

      # 4. Compile the Fedora bootc OS directly to the local runner storage
      - name: Build Local Bootc Image
        run: |
          podman build \
            -t localhost/${{ env.IMAGE_NAME }}:latest \
            -f ./Containerfile .

      # 5. Hand the local container to the ISO builder directly on the same machine
      - name: Generate Installer ISO
        run: |
          # We pass the image through the docker socket mapping directly
          docker run \
            --rm \
            --privileged \
            -v ./config.toml:/config.toml:ro \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage:ro \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --config /config.toml \
            localhost/${{ env.IMAGE_NAME }}:latest

      # 6. Upload the final bootable installer artifact directly to your dashboard
      - name: Upload ISO Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-os-installer-iso
          path: ./output/bootiso/install.iso
          if-no-files-found: error
          retention-days: 7
